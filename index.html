<html lang="fa">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Sample</title>
    <link rel="stylesheet" href="css/cafe.css">
</head>
<body>

<header class="main-header">
    <img src="img/logo.jpg" alt="Logo" class="logo">
</header>

<section class="hero">
    <img src="img/cafe-background.png" alt="Cafe Background" class="hero-image">
    <div class="overlay">
        <h1>تپ کافه</h1>
    </div>
</section>

<section class="container">
    <div class="card">
        <div class="card-img" style="background-image: url('img/coffee1.jpg');"></div>
        <div class="card-content">
            <h3>اسپرسو</h3>
            <p>90,000</p>
            <button class="card-btn">جزئیات</button>
        </div>
    </div>

    <div class="card">
        <div class="card-img" style="background-image: url('img/coffee2.jpg');"></div>
        <div class="card-content">
            <h3>کاپوچینو</h3>
            <p>150,000</p>
            <button class="card-btn">جزئیات</button>
        </div>
    </div>

    <div class="card">
        <div class="card-img" style="background-image: url('img/coffee3.jpg');"></div>
        <div class="card-content">
            <h3>کیک شکلاتی</h3>
            <p>240,000</p>
            <button class="card-btn">جزئیات</button>
        </div>
    </div>
</section>

</body>
</html>
